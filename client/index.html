<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humidity Monitor</title>
    <link rel="shortcut icon" href="favicon.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💧​ Humidity Monitor</h1>

    <div class="cards">

        <div class="card">
            <h2>Humidity</h2>
            <div class="value">
                <span id="humidity">--</span>%
            </div>
        </div>

        <div class="card">
            <h2>Critical Status</h2>
            <div class="value" id="status">
                <span id="status">--</span>
            </div>
        </div>

        <div class="card">
            <h2>API Online</h2>
            <div class="value" id="api_online">
                false
            </div>
        </div>

        <div class="card">
            <h2>Sensor Online</h2>
            <div class="value" id="sensor_online">
                --
            </div>
        </div>

    </div>


</div>

<script src="script.js"></script>

</body>
</html>
